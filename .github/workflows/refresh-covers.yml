name: Refresh covers
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/fetch-covers.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet || git commit -m "chore: refresh covers $(date -u +%Y-%m-%d) [skip ci]"
          git push
